<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roulette Pressure Engine</title>
<style>
body { font-family: Arial, sans-serif; background: #111; color: white; padding: 20px; }

input { width: 100%; padding: 10px; font-size: 18px; margin-bottom: 20px; box-sizing: border-box; }

.row  { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
.scroll-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; }

.cell { padding: 4px 6px; font-weight: bold; border-radius: 4px; min-width: 28px; text-align: center; font-size: 12px; }
.red   { background:#c62828; }
.black { background:#000; }
.green { background:#2e7d32; }
.RO { background:#c62828; color:white; border-radius:50%; }
.RE { background:#FF4D00; color:black; border-radius:50%; }
.BO { background:#1565c0; color:white; border-radius:50%; }
.BE { background:black;   color:white; border-radius:50%; }

.stats { font-size: 14px; margin-top: 5px; margin-bottom: 5px; }
.label { color:#aaa; font-size:13px; }

/* ── shared table styles ── */
.stat-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0 5px;
    margin-top: 6px;
    margin-bottom: 16px;
}

.stat-table th {
    color: #666;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 0 6px 5px 6px;
    text-align: center;
    border-bottom: 1px solid #2a2a2a;
    white-space: nowrap;
}

.stat-table th.left { text-align: left; }

.stat-table td {
    padding: 5px 6px;
    vertical-align: middle;
    text-align: center;
    font-size: 13px;
}

.combo-cell {
    font-weight: bold;
    font-size: 15px;
    white-space: nowrap;
    text-align: center;
}

/* muted value cells for historic */
.val-normal   { color: #888; }
.val-mild     { color: #aaa; }
.val-elevated { color: #ffaa44; }
.val-high     { color: #ff5522; }
.val-extreme  { color: #ff2200; font-weight: bold; }

/* max pressure badge */
.max-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: bold;
    font-size: 12px;
    background: #1e1e1e;
    color: #ccc;
    border: 1px solid #333;
}
.max-warm { background:#1a0d00!important; color:#ffaa66!important; border:2px solid #ff6600!important; box-shadow:0 0 6px #ff440055; }
.max-fire { background:#1a0500!important; color:#ffccaa!important; border:2px solid #ff3300!important; box-shadow:0 0 10px #ff2200aa; animation:pulse-hot 1s infinite alternate; }
.max-ice  { font-weight:bold!important; background:#00080f!important; color:#e0f8ff!important; border:2px solid #00cfff!important; box-shadow:0 0 10px #00bbff,0 0 22px #00eeffaa; animation:pulse-cold 1.4s infinite alternate; }

/* shared badge base */
.badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 8px;
    font-weight: bold;
    font-size: 13px;
    background: #1e1e1e;
    color: #ccc;
    border: 1px solid #333;
}
.badge-hot  { background:#1a0800!important; color:#ffddcc!important; border:2px solid #ff6a00!important; box-shadow:0 0 10px #ff4400,0 0 22px #ff220066; animation:pulse-hot 1.2s infinite alternate; }
.badge-cold { background:#00101a!important; color:#ccefff!important; border:2px solid #00cfff!important; box-shadow:0 0 10px #00aaff,0 0 22px #00cfff66; animation:pulse-cold 1.4s infinite alternate; }
.badge-warm { background:#1a0d00!important; color:#ffaa66!important; border:2px solid #ff6600!important; box-shadow:0 0 8px #ff440077; animation:pulse-hot 1.3s infinite alternate; }
.badge-fire { background:#1a0500!important; color:#ffccaa!important; border:2px solid #ff3300!important; box-shadow:0 0 12px #ff2200aa; animation:pulse-hot 1s infinite alternate; }
.badge-ice  { font-weight:bold!important; background:#00080f!important; color:#e0f8ff!important; border:2px solid #00cfff!important; box-shadow:0 0 12px #00bbff,0 0 26px #00eeffaa; animation:pulse-cold 1.4s infinite alternate; }

@keyframes pulse-hot  { from{box-shadow:0 0 6px #ff4400,0 0 14px #ff220055} to{box-shadow:0 0 18px #ff6600,0 0 34px #ff440088} }
@keyframes pulse-cold { from{box-shadow:0 0 6px #0099dd,0 0 14px #00ccff44} to{box-shadow:0 0 18px #00bbff,0 0 34px #00eeff88} }

/* bar */
.bar-wrap { display:flex; justify-content:center; align-items:center; width:100%; }
.bar-bg   { width:100px; height:7px; background:#2a2a2a; border-radius:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:4px; transition:width 0.4s ease; background:rgba(255,255,255,0.85); }
.bar-fill.bar-hot  { background:linear-gradient(90deg,rgba(255,255,255,0.7),#ffaa66); }
.bar-fill.bar-fire { background:linear-gradient(90deg,rgba(255,255,255,0.7),#ff6633); }
.bar-fill.bar-ice  { background:linear-gradient(90deg,rgba(255,255,255,0.7),#00eeff); }
.bar-fill.bar-cold { background:linear-gradient(90deg,rgba(255,255,255,0.7),#00aaff); }

h2 { margin-bottom: 10px; text-align: center; }

.section-divider { border: none; border-top: 1px solid #2a2a2a; margin: 10px 0 14px 0; }
</style>
</head>
<body>

<h2>Roulette Pressure Engine</h2>
<input id="input" placeholder="Paste numbers or enter spins">
<div id="live" class="stats"></div>
<div id="historyStats" class="stats"></div>
<div id="stream" class="scroll-row"></div>
<div id="numbers" class="row"></div>

<script>
const RED = new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
let history = [];

function classify(n){
    if(n===0) return null;
    if( RED.has(n) && n%2===1) return "RO";
    if(!RED.has(n) && n%2===0) return "BE";
    if(!RED.has(n) && n%2===1) return "BO";
    if( RED.has(n) && n%2===0) return "RE";
}

function parseInput(s){
    return s.replace(/,/g," ").split(/\s+/).map(x=>parseInt(x)).filter(x=>!isNaN(x));
}

function calcPressure(hist){
    function since(target, opposite){
        let c=0;
        for(let i=0;i<hist.length;i++){
            let n=hist[i];
            if(n===0){c++;continue;}
            let v=classify(n);
            if(v===target) break;
            if(v===opposite) c++;
        }
        return c;
    }
    return { RO:since("RO","BE"), BE:since("BE","RO"), BO:since("BO","RE"), RE:since("RE","BO") };
}

function calcLast20Counts(hist){
    const counts={RO:0,BE:0,BO:0,RE:0,zero:0};
    for(let n of hist.slice(0,20)){
        if(n===0){counts.zero++;continue;}
        let v=classify(n); if(v) counts[v]++;
    }
    return counts;
}

function occBadgeClass(c){ if(c>=8) return "badge badge-hot"; if(c<=2) return "badge badge-cold"; return "badge"; }
function presBadgeClass(v){ if(v>=7) return "badge badge-ice"; if(v>=6) return "badge badge-fire"; if(v>=5) return "badge badge-warm"; return "badge"; }
function occIcon(c){ if(c>=8) return " 🔥"; if(c<=2) return " 🧊"; return ""; }
function presIcon(v){ if(v>=7) return " 🧊"; if(v>=5) return " 🔥"; return ""; }
function occBarTint(c){ if(c>=8) return "bar-hot"; if(c<=2) return "bar-cold"; return ""; }
function presBarTint(v){ if(v>=7) return "bar-ice"; if(v>=6) return "bar-fire"; return ""; }

function bar(pct, tint){
    return `<div class="bar-wrap"><div class="bar-bg"><div class="bar-fill ${tint}" style="width:${pct}%"></div></div></div>`;
}

function liveRow(label, occ, pres){
    const occPct  = Math.min(100,(occ/20)*100);
    const presPct = Math.min(100,(pres/15)*100);
    return `
    <tr>
      <td class="combo-cell">${label}</td>
      <td><span class="${occBadgeClass(occ)}">${occ}${occIcon(occ)}</span></td>
      <td>${bar(occPct, occBarTint(occ))}</td>
      <td><span class="${presBadgeClass(pres)}">${pres}${presIcon(pres)}</span></td>
      <td>${bar(presPct, presBarTint(pres))}</td>
    </tr>`;
}

function maxBadgeClass(m){
    if(m>=7) return "max-badge max-ice";
    if(m>=5) return "max-badge max-fire";
    if(m>=3) return "max-badge max-warm";
    return "max-badge";
}

function histRow(label, d, maxP){
    return `
    <tr>
      <td class="combo-cell">${label}</td>
      <td><span class="${maxBadgeClass(maxP)}">${maxP}</span></td>
      <td class="val-normal">${d.normal}</td>
      <td class="val-mild">${d.mild}</td>
      <td class="val-elevated">${d.elevated}</td>
      <td class="val-high">${d.high}</td>
      <td class="val-extreme">${d.extreme}</td>
    </tr>`;
}

function calcHistory(hist, maxLookback=500){
    const slice=hist.slice(0,maxLookback);
    const systems={RO:"BE",BE:"RO",BO:"RE",RE:"BO"};
    let result={};
    for(let s in systems){
        let opposite=systems[s];
        let counts={normal:0,mild:0,elevated:0,high:0,extreme:0};
        let maxPressure=0, pressure=0;
        for(let i=slice.length-1;i>=0;i--){
            let n=slice[i];
            if(n===0){ pressure++; }
            else { let v=classify(n); if(v===s) pressure=0; if(v===opposite) pressure++; }
            if(pressure>maxPressure) maxPressure=pressure;
            if     (pressure<=1) counts.normal++;
            else if(pressure<=3) counts.mild++;
            else if(pressure<=5) counts.elevated++;
            else if(pressure<=7) counts.high++;
            else                 counts.extreme++;
        }
        result[s]={counts,max:maxPressure};
    }
    return result;
}

function render(){
    let p   = calcPressure(history);
    let c20 = calcLast20Counts(history);

    document.getElementById("live").innerHTML=`
<table class="stat-table">
  <thead>
    <tr>
      <th>Combo</th>
      <th>Occ (last 20)</th>
      <th>Occ bar</th>
      <th>Pressure</th>
      <th>Pressure bar</th>
    </tr>
  </thead>
  <tbody>
    ${liveRow("🔴 RO", c20.RO, p.RO)}
    ${liveRow("⚫ BE", c20.BE, p.BE)}
    ${liveRow("🔵 BO", c20.BO, p.BO)}
    ${liveRow("🟡 RE", c20.RE, p.RE)}
  </tbody>
</table>`;

    let h=calcHistory(history);
    document.getElementById("historyStats").innerHTML=`
<hr class="section-divider">
<table class="stat-table">
  <thead>
    <tr>
      <th>Combo</th>
      <th>Max</th>
      <th>Normal (0-1)</th>
      <th>Mild (2-3)</th>
      <th>Elevated (4-5)</th>
      <th>High (6-7)</th>
      <th>Extreme (8+)</th>
    </tr>
  </thead>
  <tbody>
    ${histRow("🔴 RO", h.RO.counts, h.RO.max)}
    ${histRow("⚫ BE", h.BE.counts, h.BE.max)}
    ${histRow("🔵 BO", h.BO.counts, h.BO.max)}
    ${histRow("🟡 RE", h.RE.counts, h.RE.max)}
  </tbody>
</table>`;

    let stream=document.getElementById("stream");
    stream.innerHTML="";
    history.slice(0,50).forEach(n=>{
        let v=classify(n);
        let d=document.createElement("div");
        d.className="cell "+(v||"green");
        d.textContent=v||0;
        stream.appendChild(d);
    });

    let ndiv=document.getElementById("numbers");
    ndiv.innerHTML="";
    history.forEach(n=>{
        let d=document.createElement("div");
        d.className="cell "+(n===0?"green":(RED.has(n)?"red":"black"));
        d.textContent=n;
        ndiv.appendChild(d);
    });
}

document.getElementById("input").addEventListener("keydown",e=>{
    if(e.key==="Enter"){
        let vals=parseInput(e.target.value);
        if(vals.length) history=[...vals.reverse(),...history];
        e.target.value="";
        render();
    }
});
</script>
</body>
</html>
